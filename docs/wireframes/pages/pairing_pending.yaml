documentType: page
specVersion: "1.1"
id: pairing_pending
page:
  id: pairing_pending
  template: onboarding_template
  viewport:
    device: mobile
    orientation: portrait
  rendering:
    mode: card
  wireframeStyle:
    border:
      style: solid
      width: thin
    corner:
      style: rounded
      radius: 12
  slots:
    - slotId: main
      content:
        - id: pairing_container
          component: section
          layout:
            type: stack
            padding: 32
            gap: 24
            align: center
          children:
            - id: pairing_icon
              component: icon
              props:
                name: link
                style: solid
                size: 2xl

            - id: pairing_title
              component: heading
              props:
                label: "Waiting for Approval"
                level: 3

            - id: pairing_desc
              component: paragraph
              props:
                label: "Your device is requesting to pair with the Gateway. Approve the pairing request on your Gateway to continue."

            - id: pairing_info_card
              component: section
              layout:
                type: stack
                gap: 12
                padding: 20
              size:
                width: "100%"
              children:
                - id: device_id_row
                  component: section
                  layout:
                    type: row
                    justify: space-between
                  children:
                    - id: device_id_label
                      component: text
                      props:
                        label: "Device ID"
                    - id: device_id_value
                      component: text
                      props:
                        label: "iPhone-A3F2"
                - id: request_id_row
                  component: section
                  layout:
                    type: row
                    justify: space-between
                  children:
                    - id: request_id_label
                      component: text
                      props:
                        label: "Request ID"
                    - id: request_id_value
                      component: text
                      props:
                        label: "req_8k2m..."
                - id: gateway_row
                  component: section
                  layout:
                    type: row
                    justify: space-between
                  children:
                    - id: gateway_label
                      component: text
                      props:
                        label: "Gateway"
                    - id: gateway_value
                      component: text
                      props:
                        label: "192.168.1.100"

            - id: approval_instructions
              component: section
              layout:
                type: stack
                gap: 8
                padding: 16
              children:
                - id: how_to_approve
                  component: heading
                  props:
                    label: "How to approve"
                    level: 6
                - id: approve_step_1
                  component: text
                  props:
                    label: "1. Open terminal on your Gateway machine"
                - id: approve_step_2
                  component: text
                  props:
                    label: "2. The pairing prompt will appear automatically"
                - id: approve_step_3
                  component: text
                  props:
                    label: "3. Type 'yes' to approve this device"

            - id: cancel_btn
              component: button
              props:
                label: "Cancel"
                variant: secondary
              interaction:
                - type: navigation
                  targetRoute: welcome
