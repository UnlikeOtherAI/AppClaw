documentType: page
specVersion: "1.1"
id: manual_connect
page:
  id: manual_connect
  template: onboarding_template
  viewport:
    device: mobile
    orientation: portrait
  rendering:
    mode: card
  wireframeStyle:
    border:
      style: solid
      width: thin
    corner:
      style: rounded
      radius: 12
  pageState:
    connection_mode: "paste"
  slots:
    - slotId: main
      content:
        - id: connect_form
          component: section
          layout:
            type: stack
            padding: 24
            gap: 20
          children:
            - id: connect_title
              component: heading
              props:
                label: "Connect to Gateway"
                level: 3

            - id: mode_tabs
              component: tab_bar
              children:
                - id: tab_paste
                  component: button
                  props:
                    label: "Paste Code"
                  interaction:
                    - type: set_state
                      scope: page
                      stateKey: connection_mode
                      value: "paste"
                - id: tab_manual
                  component: button
                  props:
                    label: "Manual"
                  interaction:
                    - type: set_state
                      scope: page
                      stateKey: connection_mode
                      value: "manual"

            # Paste code section
            - id: paste_section
              component: section
              layout:
                type: stack
                gap: 16
              visibility:
                condition:
                  type: state_equals
                  scope: page
                  key: connection_mode
                  equals: "paste"
              children:
                - id: paste_instructions
                  component: paragraph
                  props:
                    label: "Paste the setup code from your Gateway pairing channel (e.g., Telegram /pair command)."
                - id: setup_code_input
                  component: textarea
                  props:
                    label: "Setup Code"
                    placeholder: "Paste your base64 setup code here..."
                - id: code_warning
                  component: section
                  layout:
                    type: row
                    gap: 8
                    padding: 12
                    align: center
                  children:
                    - id: warning_icon
                      component: icon
                      props:
                        name: triangle-exclamation
                        size: sm
                    - id: warning_text
                      component: text
                      props:
                        label: "Setup codes are sensitive. Do not share them in screenshots or chats."
                - id: paste_connect_btn
                  component: button
                  props:
                    label: "Connect"
                    variant: primary
                    icon: plug
                  interaction:
                    - type: navigation
                      targetRoute: pairing_pending

            # Manual entry section
            - id: manual_section
              component: section
              layout:
                type: stack
                gap: 16
              visibility:
                condition:
                  type: state_equals
                  scope: page
                  key: connection_mode
                  equals: "manual"
              children:
                - id: host_input
                  component: input
                  props:
                    label: "Gateway Host"
                    placeholder: "192.168.1.100 or my-gateway.tail1234.ts.net"
                    type: text
                - id: port_input
                  component: input
                  props:
                    label: "Port"
                    placeholder: "18789"
                    type: number
                - id: token_input
                  component: input
                  props:
                    label: "Token / Password"
                    placeholder: "Gateway auth token"
                    type: password
                - id: tls_toggle
                  component: toggle
                  props:
                    label: "Use TLS (wss://)"
                - id: manual_connect_btn
                  component: button
                  props:
                    label: "Connect"
                    variant: primary
                    icon: plug
                  interaction:
                    - type: navigation
                      targetRoute: pairing_pending
