documentType: page
specVersion: "1.1"
id: sessions
page:
  id: sessions
  template: main_template
  viewport:
    device: mobile
    orientation: portrait
  rendering:
    mode: card
  wireframeStyle:
    border:
      style: solid
      width: thin
    corner:
      style: rounded
      radius: 12
  pageState:
    search_active: false
  slots:
    - slotId: main
      content:
        # Navigation bar area
        - id: sessions_nav
          component: section
          layout:
            type: row
            padding: 16
            align: center
            justify: space-between
          children:
            - id: sessions_title
              component: heading
              props:
                text: "Sessions"
                level: 2
            - id: new_session_btn
              component: button
              props:
                label: ""
                icon: plus
                variant: ghost

        # Search bar
        - id: search_bar
          component: section
          layout:
            type: row
            padding: 16
            gap: 8
            align: center
          children:
            - id: search_icon
              component: icon
              props:
                name: magnifying-glass
                size: sm
            - id: search_input
              component: input
              size:
                width: "100%"
              props:
                placeholder: "Search sessions..."
                type: text

        # Connection status banner
        - id: connection_status
          component: section
          layout:
            type: row
            padding: 12
            gap: 8
            align: center
          children:
            - id: status_dot
              component: icon
              props:
                name: circle
                style: solid
                size: xs
            - id: status_text
              component: text
              props:
                text: "Connected to Home Gateway"

        # Session list
        - id: session_list
          component: section
          layout:
            type: stack
            gap: 1
          children:
            - id: session_1
              component: section
              layout:
                type: row
                padding: 16
                gap: 12
                align: center
              interaction:
                - type: navigation
                  targetRoute: chat
              children:
                - id: s1_avatar
                  component: icon
                  props:
                    name: robot
                    style: solid
                    size: lg
                - id: s1_info
                  component: section
                  layout:
                    type: stack
                    gap: 4
                  size:
                    width: "100%"
                  children:
                    - id: s1_title_row
                      component: section
                      layout:
                        type: row
                        justify: space-between
                        align: center
                      children:
                        - id: s1_title
                          component: text
                          props:
                            text: "iOS app architecture"
                        - id: s1_time
                          component: text
                          props:
                            text: "2m ago"
                    - id: s1_preview
                      component: text
                      props:
                        text: "Here's the SwiftUI implementation plan for the..."

            - id: session_2
              component: section
              layout:
                type: row
                padding: 16
                gap: 12
                align: center
              interaction:
                - type: navigation
                  targetRoute: chat
              children:
                - id: s2_avatar
                  component: icon
                  props:
                    name: robot
                    style: solid
                    size: lg
                - id: s2_info
                  component: section
                  layout:
                    type: stack
                    gap: 4
                  size:
                    width: "100%"
                  children:
                    - id: s2_title_row
                      component: section
                      layout:
                        type: row
                        justify: space-between
                        align: center
                      children:
                        - id: s2_title
                          component: text
                          props:
                            text: "Debug WebSocket issue"
                        - id: s2_time
                          component: text
                          props:
                            text: "1h ago"
                    - id: s2_preview
                      component: text
                      props:
                        text: "The connection keeps dropping because the keep-alive..."

            - id: session_3
              component: section
              layout:
                type: row
                padding: 16
                gap: 12
                align: center
              interaction:
                - type: navigation
                  targetRoute: chat
              children:
